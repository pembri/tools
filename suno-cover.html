<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suno Cover • ApiPass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(180deg, #0a0a0a, #1a1a2e); }
    .suno-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    .slider-thumb { accent-color: #a855f7; }
  </style>
</head>
<body class="text-white min-h-screen pb-12">

<div class="max-w-2xl mx-auto pt-8 px-4">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex items-center justify-center text-2xl">🎵</div>
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Suno Cover</h1>
        <p class="text-zinc-400 text-sm">Reimagine any song in a new style</p>
      </div>
    </div>
    <div class="text-xs bg-zinc-800 px-3 py-1 rounded-full text-emerald-400">ApiPass • Real</div>
  </div>

  <!-- API Key -->
  <div class="suno-card border border-zinc-700 rounded-3xl p-6 mb-8">
    <label class="block text-zinc-400 text-sm mb-2">Your ApiPass API Key</label>
    <div class="relative">
      <input id="apiKey" type="password" placeholder="sk-ap-..." 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-purple-500">
      <button onclick="togglePassword()" class="absolute right-4 top-3.5 text-zinc-400 hover:text-white">
        <i id="eye" class="fas fa-eye"></i>
      </button>
    </div>
  </div>

  <div class="suno-card border border-zinc-700 rounded-3xl p-8">

    <!-- Upload -->
    <div class="mb-8">
      <label class="text-sm text-zinc-400 mb-3 block">Upload Original Audio</label>
      <div id="uploadArea" onclick="document.getElementById('fileInput').click()"
           class="border-2 border-dashed border-zinc-600 hover:border-purple-500 rounded-3xl p-12 text-center cursor-pointer transition">
        <i class="fas fa-cloud-upload-alt text-5xl text-zinc-500 mb-4"></i>
        <p class="text-lg font-medium">Drop audio or click to upload</p>
        <p class="text-zinc-500 text-sm mt-1">MP3, WAV, M4A (max 50MB)</p>
      </div>
      <input type="file" id="fileInput" accept="audio/*" class="hidden">
      <div id="fileInfo" class="hidden mt-4 bg-zinc-900 rounded-2xl p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i class="fas fa-music text-purple-400"></i>
          <span id="fileName" class="text-sm"></span>
        </div>
        <button onclick="removeFile()" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
      </div>
    </div>

    <!-- Audio URL -->
    <div class="mb-8">
      <label class="text-sm text-zinc-400 mb-2 block">Audio URL (Public)</label>
      <input id="audioUrl" type="url" placeholder="https://catbox.moe/files/xxxx.mp3" 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
    </div>

    <!-- Model -->
    <div class="mb-8">
      <label class="text-sm text-zinc-400 mb-2 block">Model Version</label>
      <select id="modelVersion" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
        <option value="V5">V5 — Latest & Best</option>
        <option value="V4_5PLUS">V4.5 Plus</option>
        <option value="V4_5ALL">V4.5 All</option>
        <option value="V4_5">V4.5</option>
        <option value="V4">V4</option>
      </select>
    </div>

    <!-- Toggles -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div onclick="toggleCustom()" class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="customMode" class="w-5 h-5 accent-purple-600">
        <div>
          <p class="font-medium">Custom Mode</p>
          <p class="text-xs text-zinc-500">Define your own style & title</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <input type="checkbox" id="instrumental" class="w-5 h-5 accent-purple-600">
        <div>
          <p class="font-medium">Instrumental Only</p>
        </div>
      </div>
    </div>

    <!-- Prompt -->
    <div class="mb-8">
      <label class="text-sm text-zinc-400 mb-2 block">Prompt <span class="text-red-400">*</span></label>
      <textarea id="prompt" rows="4" placeholder="Turn this into an upbeat pop version with powerful female vocals..."
                class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-4 text-sm resize-y"></textarea>
    </div>

    <!-- Custom Fields -->
    <div id="customSection" class="hidden space-y-6 mb-8">
      <div>
        <label class="text-sm text-zinc-400 mb-2 block">Style / Genre</label>
        <input id="style" type="text" placeholder="upbeat pop, electronic, female vocal" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
      </div>
      <div>
        <label class="text-sm text-zinc-400 mb-2 block">Title</label>
        <input id="title" type="text" placeholder="My Song - Pop Cover" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
      </div>
    </div>

    <!-- Advanced Params -->
    <div class="grid grid-cols-2 gap-6 mb-8">
      <div>
        <label class="text-sm text-zinc-400 mb-2 block">Continue At (seconds)</label>
        <input id="continueAt" type="number" value="0" min="0" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
      </div>
      <div>
        <label class="text-sm text-zinc-400 mb-2 block">Vocal Gender</label>
        <select id="vocalGender" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
          <option value="f">Female</option>
          <option value="m">Male</option>
        </select>
      </div>
    </div>

    <!-- Sliders -->
    <div class="mb-8">
      <div class="flex justify-between text-sm mb-1">
        <span class="text-zinc-400">Style Weight</span>
        <span id="styleVal" class="font-mono text-purple-400">0.50</span>
      </div>
      <input type="range" id="styleWeight" min="0" max="1" step="0.05" value="0.5" 
             oninput="document.getElementById('styleVal').textContent = parseFloat(this.value).toFixed(2)"
             class="slider-thumb w-full">
    </div>

    <div class="mb-8">
      <div class="flex justify-between text-sm mb-1">
        <span class="text-zinc-400">Audio Weight</span>
        <span id="audioVal" class="font-mono text-purple-400">0.30</span>
      </div>
      <input type="range" id="audioWeight" min="0" max="1" step="0.05" value="0.3" 
             oninput="document.getElementById('audioVal').textContent = parseFloat(this.value).toFixed(2)"
             class="slider-thumb w-full">
    </div>

    <!-- Exclude Styles -->
    <div class="mb-10">
      <label class="text-sm text-zinc-400 mb-2 block">Exclude Styles (optional)</label>
      <input id="excludeStyles" type="text" placeholder="rock, metal, classical" 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
    </div>

    <!-- Run Button -->
    <button onclick="startGeneration()" id="runBtn"
            class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 py-5 rounded-3xl text-lg font-semibold flex items-center justify-center gap-3 transition">
      <i class="fas fa-wand-magic-sparkles"></i>
      <span>Generate Cover</span>
    </button>

  </div>

  <!-- Result Area -->
  <div id="resultArea" class="hidden mt-10 suno-card border border-zinc-700 rounded-3xl p-8">
    <h3 class="text-lg font-semibold mb-4">Hasil Cover</h3>
    <div id="playerContainer" class="mb-6"></div>
    <button onclick="resetAll()" 
            class="w-full bg-zinc-800 hover:bg-zinc-700 py-4 rounded-3xl text-sm font-medium">
      Buat Cover Lagi
    </button>
  </div>

</div>

<script>
// Auto save API Key
const apiKeyInput = document.getElementById('apiKey');
apiKeyInput.value = localStorage.getItem('apipass_key') || '';
apiKeyInput.addEventListener('change', () => {
  if (apiKeyInput.value) localStorage.setItem('apipass_key', apiKeyInput.value);
});

function togglePassword() {
  const isPassword = apiKeyInput.type === 'password';
  apiKeyInput.type = isPassword ? 'text' : 'password';
  document.getElementById('eye').classList.toggle('fa-eye-slash', isPassword);
}

// File upload preview
let selectedFile = null;
document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files[0]) {
    selectedFile = e.target.files[0];
    document.getElementById('fileName').textContent = selectedFile.name;
    document.getElementById('fileInfo').classList.remove('hidden');
  }
});

function removeFile() {
  selectedFile = null;
  document.getElementById('fileInfo').classList.add('hidden');
}

function toggleCustom() {
  document.getElementById('customSection').classList.toggle('hidden', !document.getElementById('customMode').checked);
}

// Main Generation
async function startGeneration() {
  const apiKey = apiKeyInput.value.trim();
  const audioUrl = document.getElementById('audioUrl').value.trim();
  const prompt = document.getElementById('prompt').value.trim();

  if (!apiKey) return alert("Masukkan API Key ApiPass!");
  if (!audioUrl) return alert("Isi Audio URL publik!");
  if (!prompt) return alert("Isi Prompt!");

  localStorage.setItem('apipass_key', apiKey);

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Generating...`;

  const payload = {
    model: "suno/cover",
    input: {
      model_version: document.getElementById('modelVersion').value,
      audioUrl: audioUrl,
      prompt: prompt,
      customMode: document.getElementById('customMode').checked,
      instrumental: document.getElementById('instrumental').checked,
      continueAt: parseInt(document.getElementById('continueAt').value) || 0,
      vocalGender: document.getElementById('vocalGender').value,
      styleWeight: parseFloat(document.getElementById('styleWeight').value),
      audioWeight: parseFloat(document.getElementById('audioWeight').value),
      negativeTags: document.getElementById('excludeStyles').value.trim()
    }
  };

  if (payload.input.customMode) {
    payload.input.style = document.getElementById('style').value.trim();
    payload.input.title = document.getElementById('title').value.trim();
  }

  try {
    const res = await fetch("https://api.apipass.dev/api/v1/jobs/createTask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    const taskId = data.taskId || data.id;

    if (taskId) {
      pollTask(apiKey, taskId);
    } else {
      throw new Error(data.message || "Gagal membuat task");
    }
  } catch (err) {
    alert("Error: " + err.message);
    btn.disabled = false;
    btn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i><span>Generate Cover</span>`;
  }
}

let pollTimer = null;

function pollTask(apiKey, taskId) {
  let count = 0;
  pollTimer = setInterval(async () => {
    count++;
    try {
      const res = await fetch(`https://api.apipass.dev/api/v1/jobs/recordInfo?taskId=${taskId}`, {
        headers: { "Authorization": `Bearer ${apiKey}` }
      });
      const result = await res.json();

      if (result.status === "completed" && result.output?.audioUrl) {
        clearInterval(pollTimer);
        showSuccess(result.output.audioUrl);
      } else if (result.status === "failed") {
        clearInterval(pollTimer);
        alert("Generation gagal: " + (result.error || "Unknown"));
        resetButton();
      }
    } catch (e) {}

    if (count > 80) {
      clearInterval(pollTimer);
      alert("Waktu tunggu habis. Coba lagi.");
      resetButton();
    }
  }, 4000);
}

function showSuccess(audioUrl) {
  const container = document.getElementById('playerContainer');
  container.innerHTML = `
    <audio controls class="w-full rounded-2xl" style="background:#27272a">
      <source src="${audioUrl}" type="audio/mpeg">
    </audio>
  `;
  document.getElementById('resultArea').classList.remove('hidden');
  resetButton();
}

function resetButton() {
  const btn = document.getElementById('runBtn');
  btn.disabled = false;
  btn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i><span>Generate Cover</span>`;
}

function resetAll() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('playerContainer').innerHTML = '';
  removeFile();
}
</script>
</body>
</html>
