<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suno Cover Sederhana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">

<div class="max-w-lg mx-auto">

  <h1 class="text-3xl font-bold text-center mb-8">Suno Cover</h1>

  <!-- API Key -->
  <input id="apiKey" type="password" placeholder="Paste ApiPass API Key di sini" 
         class="w-full p-4 rounded-2xl bg-zinc-900 mb-6 text-sm">

  <!-- Upload -->
  <div onclick="document.getElementById('fileInput').click()" 
       class="border-2 border-dashed border-zinc-700 hover:border-purple-500 rounded-3xl p-10 text-center cursor-pointer mb-6">
    <i class="fas fa-cloud-upload-alt text-4xl mb-3 text-purple-400"></i>
    <p>Upload Audio Original</p>
  </div>
  <input type="file" id="fileInput" accept="audio/*" class="hidden">

  <div id="urlStatus" class="text-emerald-400 text-xs mb-6 text-center hidden"></div>

  <!-- Prompt -->
  <textarea id="prompt" rows="4" placeholder="Tulis lirik atau deskripsi cover yang diinginkan..." 
            class="w-full p-4 rounded-3xl bg-zinc-900 mb-6"></textarea>

  <!-- Vocal -->
  <div class="mb-6">
    <p class="text-zinc-400 text-sm mb-2">Vocal Gender</p>
    <select id="vocal" class="w-full p-4 rounded-2xl bg-zinc-900">
      <option value="f">Female</option>
      <option value="m">Male</option>
    </select>
  </div>

  <!-- Weights -->
  <div class="grid grid-cols-2 gap-4 mb-8">
    <div>
      <p class="text-xs text-zinc-400 mb-1">Style Weight <span id="sw" class="font-mono">0.5</span></p>
      <input type="range" id="styleWeight" min="0" max="1" step="0.1" value="0.5" 
             oninput="document.getElementById('sw').textContent=this.value" class="w-full">
    </div>
    <div>
      <p class="text-xs text-zinc-400 mb-1">Audio Weight <span id="aw" class="font-mono">0.3</span></p>
      <input type="range" id="audioWeight" min="0" max="1" step="0.1" value="0.3" 
             oninput="document.getElementById('aw').textContent=this.value" class="w-full">
    </div>
  </div>

  <!-- Generate -->
  <button onclick="startGenerate()" id="btn"
          class="w-full py-5 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl text-lg font-semibold">
    Generate Cover
  </button>

  <!-- Output Area -->
  <div id="output" class="hidden mt-10">
    <p class="text-center text-zinc-400 mb-4">Hasil Cover:</p>
    <div id="player" class="bg-zinc-900 rounded-3xl p-4"></div>
  </div>

</div>

<script>
// Upload otomatis ke catbox
document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  const form = new FormData();
  form.append('reqtype', 'fileupload');
  form.append('fileToUpload', file);

  const res = await fetch('https://catbox.moe/user/api.php', {method: 'POST', body: form});
  const url = await res.text();
  window.audioUrl = url.trim();
  document.getElementById('urlStatus').innerHTML = `✅ Audio terupload: <span class="font-mono text-[10px]">${url}</span>`;
  document.getElementById('urlStatus').classList.remove('hidden');
};

async function startGenerate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) return alert("Masukkan API Key dulu!");
  if (!window.audioUrl) return alert("Upload audio dulu!");

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = "Sedang diproses...";

  const payload = {
    model: "suno/cover",
    input: {
      audioUrl: window.audioUrl,
      prompt: document.getElementById('prompt').value.trim(),
      vocalGender: document.getElementById('vocal').value,
      styleWeight: parseFloat(document.getElementById('styleWeight').value),
      audioWeight: parseFloat(document.getElementById('audioWeight').value)
    }
  };

  // ... (bagian fetch createTask + polling tetap sama seperti sebelumnya)

  // Untuk sekarang, aku kasih versi ringkas dulu. Kalau mau full polling + player, bilang "kasih full code lengkap"
}

</script>
</body>
</html>
