<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Elite Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Tetap Mewah (Glassmorphism) */
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; }
        .app-container { width: 100%; max-width: 480px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); overflow: hidden; }
        .header { padding: 30px 20px 15px; text-align: center; }
        .header h1 { font-size: 1.5rem; margin: 0; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 3px; }
        .lang-selector { display: flex; align-items: center; justify-content: space-around; padding: 20px; background: rgba(0, 0, 0, 0.2); margin: 0 20px; border-radius: 20px; }
        select { background: none; color: #cbd5e1; border: none; font-size: 0.9rem; font-weight: 500; outline: none; width: 40%; }
        .swap-btn { width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .box { padding: 25px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.15rem; resize: none; outline: none; min-height: 120px; line-height: 1.6; }
        .result-box { padding: 25px; background: rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.05); min-height: 120px; }
        .result-text { font-size: 1.15rem; color: #4ade80; font-weight: 500; }
        .icon-btn { background: rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 12px; font-size: 0.75rem; color: #94a3b8; cursor: pointer; border:none; margin-top:10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>TRANSLATOR</h1></div>
    <div class="lang-selector">
        <select id="srcLang"><option value="auto">AUTO DETECT</option></select>
        <div class="swap-btn" onclick="swap()"><i class="fas fa-random"></i></div>
        <select id="targetLang"></select>
    </div>
    <div class="box">
        <textarea id="inputText" placeholder="Ketik di sini..." oninput="autoTranslate()"></textarea>
        <button class="icon-btn" onclick="clearAll()">CLEAR</button>
    </div>
    <div class="result-box">
        <div id="outputText" class="result-text">Hasil muncul di sini...</div>
        <button class="icon-btn" onclick="copy()">COPY RESULT</button>
        <div id="status" style="font-size: 0.6rem; color: #555; margin-top: 10px;">IDLE</div>
    </div>
</div>

<script>
    const allLangs = {"af":"Afrikaans","sq":"Albanian","ar":"Arabic","hy":"Armenian","az":"Azerbaijani","eu":"Basque","be":"Belarusian","bn":"Bengali","bs":"Bosnian","bg":"Bulgarian","ca":"Catalan","zh-CN":"Chinese","hr":"Croatian","cs":"Czech","da":"Danish","nl":"Dutch","en":"English","et":"Estonian","tl":"Filipino","fi":"Finnish","fr":"French","de":"German","el":"Greek","iw":"Hebrew","hi":"Hindi","hu":"Hungarian","is":"Icelandic","id":"Indonesian","it":"Italian","ja":"Japanese","jv":"Javanese","ko":"Korean","ms":"Malay","no":"Norwegian","fa":"Persian","pl":"Polish","pt":"Portuguese","ro":"Romanian","ru":"Russian","sr":"Serbian","sk":"Slovak","sl":"Slovenian","es":"Spanish","su":"Sundanese","th":"Thai","tr":"Turkish","uk":"Ukrainian","vi":"Vietnamese","zu":"Zulu"};

    const src = document.getElementById('srcLang');
    const target = document.getElementById('targetLang');
    Object.entries(allLangs).forEach(([code, name]) => {
        src.innerHTML += `<option value="${code}">${name.toUpperCase()}</option>`;
        target.innerHTML += `<option value="${code}">${name.toUpperCase()}</option>`;
    });
    src.value = "auto"; target.value = "en";

    let timer;
    function autoTranslate() {
        document.getElementById('status').innerText = 'TYPING...';
        clearTimeout(timer);
        timer = setTimeout(execute, 600); // Jedanya agak lama dikit biar stabil
    }

    async function execute() {
        const text = document.getElementById('inputText').value;
        const out = document.getElementById('outputText');
        if(!text) { out.innerText = 'Hasil muncul di sini...'; return; }
        
        document.getElementById('status').innerText = 'TRANSLATING...';
        try {
            // PERBAIKAN: Pakai dt=at & dt=bd biar context-nya dapet
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src.value}&tl=${target.value}&dt=t&dt=at&dt=bd&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if(data && data[0]) {
                let finalResult = "";
                data[0].forEach(part => { if(part[0]) finalResult += part[0]; });
                out.innerText = finalResult;
                document.getElementById('status').innerText = 'COMPLETED';
            }
        } catch (e) { document.getElementById('status').innerText = 'ERROR'; }
    }

    function swap() { const t = src.value; src.value = target.value; target.value = t; execute(); }
    function clearAll() { document.getElementById('inputText').value = ''; execute(); }
    function copy() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); alert("Copied!"); }
</script>
</body>
</html>
