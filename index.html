<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Traffic Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>[ TRAFFIC_BOT_V3 ]</h1>

    <div id="inputPanel">
        <label>Target URL</label>
        <input type="text" id="targetUrl" placeholder="https://target-site.com">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Interval (s)</label>
                <input type="number" id="intervalTime" value="3">
            </div>
            <div style="flex:1">
                <label>Threads</label>
                <input type="number" id="threads" value="1">
            </div>
        </div>
    </div>

    <button class="btn start" id="mainBtn" onclick="toggleBot()">Execute Engine</button>

    <div id="statsPanel">
        <div class="stats-grid">
            <div class="stat-card">
                <label style="margin:0">HITS</label>
                <span class="stat-val" id="countDisplay">0</span>
            </div>
            <div class="stat-card">
                <label style="margin:0">STATUS</label>
                <span class="stat-val" id="statusText" style="color:var(--accent)">RUNNING</span>
            </div>
        </div>
    </div>

    <div class="terminal" id="logBox">> System ready. Awaiting command...</div>
</div>

<script src="script.js"></script>
</body>
</html>
