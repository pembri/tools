<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulseCover • Suno Cover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-xl mx-auto p-5">

    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-cyan-500 rounded-3xl flex items-center justify-center text-4xl">♪</div>
            <div>
                <div class="text-2xl font-bold">PulseCover</div>
                <div class="text-cyan-400 text-sm">Suno V5 Cover</div>
            </div>
        </div>
        <div onclick="showApiModal()" class="px-5 py-2 bg-zinc-800 rounded-3xl flex items-center gap-2 cursor-pointer">
            <i class="fa-solid fa-key"></i>
            <span id="api-status">API Key</span>
        </div>
    </div>

    <form id="form" onsubmit="createTask(event)" class="space-y-6">

        <div>
            <label class="block text-xs text-zinc-400 mb-2">SOURCE AUDIO URL (harus publik)</label>
            <input type="url" id="audioUrl" placeholder="https://contoh.com/lagu.mp3" required
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-base">
        </div>

        <div>
            <label class="block text-xs text-zinc-400 mb-2">COVER PROMPT</label>
            <textarea id="prompt" rows="4" placeholder="Transform into roots reggae 1970s style, warm analog sound..." 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-4"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-zinc-400 mb-2">TITLE</label>
                <input type="text" id="title" value="My Song (Reggae Cover)" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-2">VOCAL GENDER</label>
                <select id="vocalGender" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                    <option value="f">Female</option>
                    <option value="m">Male</option>
                </select>
            </div>
        </div>

        <div class="pt-4">
            <button type="submit" class="w-full py-5 bg-gradient-to-r from-cyan-400 to-violet-500 text-zinc-950 font-bold text-lg rounded-3xl">
                RUN COVER
            </button>
        </div>
    </form>

    <p class="text-center text-xs text-zinc-500 mt-10">
        Kalau masih error, coba pakai Model V4.5 di situs resmi untuk bandingkan.
    </p>
</div>

<!-- API Key Modal -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
        <input id="key-input" type="password" placeholder="apk_1445..." 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 text-lg">
        <button onclick="saveApiKey()" class="w-full py-4 bg-cyan-400 text-zinc-950 font-semibold rounded-3xl">
            Simpan API Key
        </button>
    </div>
</div>

<script>
let apiKey = localStorage.getItem('pc_key') || '';

function showApiModal() {
    document.getElementById('api-modal').classList.remove('hidden');
    document.getElementById('key-input').value = apiKey;
}

function saveApiKey() {
    apiKey = document.getElementById('key-input').value.trim();
    if (apiKey) {
        localStorage.setItem('pc_key', apiKey);
        document.getElementById('api-status').innerHTML = '✓ Terhubung';
    }
    document.getElementById('api-modal').classList.add('hidden');
}

async function createTask(e) {
    e.preventDefault();
    if (!apiKey) return alert('Masukkan API Key dulu dari apipass.dev');

    const payload = {
        model: "suno/cover",
        input: {
            model_version: "V4_5",                    // pakai V4.5 dulu (lebih stabil)
            audioUrl: document.getElementById('audioUrl').value.trim(),
            prompt: document.getElementById('prompt').value.trim(),
            title: document.getElementById('title').value.trim(),
            vocalGender: document.getElementById('vocalGender').value,
            customMode: false,
            instrumental: false
        }
    };

    try {
        const res = await fetch('https://api.apipass.dev/api/v1/jobs/createTask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("Full Response dari apipass:", data);   // buka console untuk lihat detail

        if (data.code === 200) {
            alert(`✅ Berhasil!\nTask ID: ${data.data.taskId}\n\nCek hasil di https://apipass.dev/app/logs`);
        } else {
            alert(`Error dari server:\n${data.message || JSON.stringify(data)}`);
        }
    } catch (err) {
        alert("Gagal koneksi ke server:\n" + err.message);
    }
}

window.onload = () => {
    if (apiKey) document.getElementById('api-status').innerHTML = '✓ Terhubung';
};
</script>
</body>
</html>
